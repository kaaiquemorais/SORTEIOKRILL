<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sorteio Krill</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-1: #020814;
    --bg-2: #05132b;
    --bg-3: #071a3c;
    --card: rgba(10, 30, 70, 0.45);
    --card-border: rgba(86, 202, 255, 0.25);
    --text: #e6f4ff;
    --muted: #7fa8d1;
    --accent: #00d4ff;
    --accent-2: #0066ff;
    --accent-3: #3dffea;
    --glow: rgba(0, 212, 255, 0.6);
    --danger: #ff5577;
  }

  html, body {
    min-height: 100vh;
    font-family: 'Rajdhani', 'Segoe UI', sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 600px at 20% -10%, rgba(0, 102, 255, 0.35) 0%, transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(0, 212, 255, 0.25) 0%, transparent 60%),
      radial-gradient(800px 400px at 50% 110%, rgba(61, 255, 234, 0.15) 0%, transparent 60%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-1) 100%);
    background-attachment: fixed;
    position: relative;
    overflow-x: hidden;
  }

  /* grid futurista no fundo */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 212, 255, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 212, 255, 0.06) 1px, transparent 1px);
    background-size: 50px 50px;
    mask-image: radial-gradient(ellipse at center, rgba(0,0,0,.8) 0%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,.8) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 3px,
      rgba(0, 212, 255, 0.015) 3px,
      rgba(0, 212, 255, 0.015) 4px
    );
    pointer-events: none;
    z-index: 1;
  }
  .container { position: relative; z-index: 2; }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }

  header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 20px 0 32px;
    position: relative;
  }
  header img {
    height: 72px;
    width: auto;
    filter: drop-shadow(0 0 20px var(--glow)) drop-shadow(0 0 40px rgba(0, 212, 255, 0.3));
    animation: floatLogo 4s ease-in-out infinite;
  }
  @keyframes floatLogo {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 8px;
    color: var(--accent);
    text-transform: uppercase;
    text-shadow: 0 0 12px var(--glow), 0 0 24px rgba(0, 212, 255, 0.4);
    position: relative;
  }
  header h1::before, header h1::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent));
  }
  header h1::before { right: calc(100% + 12px); }
  header h1::after { left: calc(100% + 12px); background: linear-gradient(90deg, var(--accent), transparent); }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 4px;
    padding: 22px;
    backdrop-filter: blur(14px);
    position: relative;
    box-shadow:
      0 0 0 1px rgba(0, 212, 255, 0.05),
      0 8px 32px rgba(0, 20, 60, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.04);
  }
  .card::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px;
    width: 24px; height: 24px;
    border-top: 2px solid var(--accent);
    border-left: 2px solid var(--accent);
    border-top-left-radius: 4px;
    pointer-events: none;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: -1px; right: -1px;
    width: 24px; height: 24px;
    border-bottom: 2px solid var(--accent);
    border-right: 2px solid var(--accent);
    border-bottom-right-radius: 4px;
    pointer-events: none;
  }
  .card h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 3px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card h2::before {
    content: '';
    width: 8px; height: 8px;
    background: var(--accent);
    box-shadow: 0 0 10px var(--glow);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .5; transform: scale(0.85); }
  }

  textarea {
    width: 100%;
    min-height: 180px;
    padding: 14px 16px;
    border-radius: 4px;
    border: 1px solid var(--card-border);
    background: rgba(0, 10, 30, 0.6);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 500;
    resize: vertical;
    outline: none;
    transition: all .2s;
  }
  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 20px rgba(0, 212, 255, 0.25);
    background: rgba(0, 20, 50, 0.7);
  }
  textarea::placeholder { color: rgba(127, 168, 209, 0.5); }

  .row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 12px;
    align-items: center;
  }

  button, .file-label {
    cursor: pointer;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 11px 20px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    transition: all .2s;
    letter-spacing: 2px;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }
  button:active, .file-label:active { transform: scale(0.97); }
  button:disabled { opacity: .4; cursor: not-allowed; }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent-2), var(--accent));
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.35), inset 0 0 20px rgba(255, 255, 255, 0.1);
    color: #001428;
    text-shadow: 0 0 4px rgba(255, 255, 255, 0.4);
  }
  .btn-primary:hover:not(:disabled) {
    filter: brightness(1.15);
    box-shadow: 0 0 30px rgba(0, 212, 255, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.15);
    transform: translateY(-1px);
  }

  .btn-ghost {
    background: rgba(0, 212, 255, 0.05);
    border: 1px solid rgba(0, 212, 255, 0.3);
    color: var(--accent);
  }
  .btn-ghost:hover { background: rgba(0, 212, 255, 0.12); border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 212, 255, 0.25); }

  .btn-danger {
    background: rgba(255, 85, 119, 0.08);
    border: 1px solid rgba(255, 85, 119, 0.4);
    color: var(--danger);
  }
  .btn-danger:hover { background: rgba(255, 85, 119, 0.18); box-shadow: 0 0 15px rgba(255, 85, 119, 0.3); }

  .file-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0, 212, 255, 0.05);
    border: 1px solid rgba(0, 212, 255, 0.3);
    color: var(--accent);
  }
  .file-label:hover { background: rgba(0, 212, 255, 0.12); border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 212, 255, 0.25); }
  .file-label input { display: none; }

  .count-control {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0, 10, 30, 0.6);
    border: 1px solid var(--card-border);
    border-radius: 4px;
    padding: 6px 12px;
  }
  .count-control label {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .count-control input {
    width: 70px;
    padding: 6px 8px;
    border-radius: 3px;
    border: 1px solid rgba(0, 212, 255, 0.3);
    background: rgba(0, 5, 20, 0.6);
    color: var(--accent);
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    outline: none;
    transition: all .2s;
  }
  .count-control input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(0, 212, 255, 0.35);
  }

  .stats {
    display: flex;
    gap: 24px;
    margin-bottom: 14px;
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 600;
  }
  .stats span strong {
    color: var(--accent);
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    text-shadow: 0 0 8px var(--glow);
    margin-left: 6px;
  }

  .names-box {
    max-height: 360px;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-content: flex-start;
    background: rgba(0, 5, 20, 0.4);
    border: 1px dashed rgba(0, 212, 255, 0.15);
    border-radius: 4px;
  }
  .names-box::-webkit-scrollbar { width: 8px; }
  .names-box::-webkit-scrollbar-track { background: rgba(0, 212, 255, 0.05); }
  .names-box::-webkit-scrollbar-thumb { background: rgba(0, 212, 255, 0.3); border-radius: 4px; }
  .names-box::-webkit-scrollbar-thumb:hover { background: rgba(0, 212, 255, 0.5); }

  .chip {
    background: rgba(0, 102, 255, 0.08);
    border: 1px solid rgba(0, 212, 255, 0.25);
    padding: 8px 14px;
    border-radius: 3px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: .5px;
    color: var(--text);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    animation: fadeIn .3s ease;
    transition: all .2s;
  }
  .chip:hover {
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
  }
  .chip.winner {
    background: linear-gradient(135deg, var(--accent), var(--accent-3));
    color: #001428;
    border-color: var(--accent-3);
    font-weight: 800;
    box-shadow: 0 0 20px var(--glow), 0 0 40px rgba(61, 255, 234, 0.3);
    text-shadow: 0 0 4px rgba(255, 255, 255, 0.3);
  }
  .chip.rolling {
    background: linear-gradient(135deg, var(--accent-2), var(--accent));
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 25px var(--glow);
    transform: scale(1.05);
  }
  .chip .rm {
    cursor: pointer;
    opacity: .5;
    font-size: 16px;
    line-height: 1;
    transition: all .15s;
  }
  .chip .rm:hover { opacity: 1; color: var(--danger); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .winners-section {
    margin-top: 24px;
    padding: 28px;
    border-radius: 4px;
    background:
      linear-gradient(135deg, rgba(0, 212, 255, 0.08), rgba(61, 255, 234, 0.05)),
      rgba(0, 10, 30, 0.7);
    border: 1px solid var(--accent);
    text-align: center;
    display: none;
    position: relative;
    box-shadow: 0 0 30px rgba(0, 212, 255, 0.2), inset 0 0 30px rgba(0, 212, 255, 0.05);
  }
  .winners-section::before, .winners-section::after {
    content: '';
    position: absolute;
    width: 40px; height: 40px;
    border: 2px solid var(--accent-3);
  }
  .winners-section::before {
    top: -1px; left: -1px;
    border-right: none; border-bottom: none;
  }
  .winners-section::after {
    bottom: -1px; right: -1px;
    border-left: none; border-top: none;
  }
  .winners-section.show { display: block; animation: fadeIn .4s ease; }
  .winners-section h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 900;
    color: var(--accent-3);
    letter-spacing: 6px;
    margin-bottom: 20px;
    text-shadow: 0 0 10px rgba(61, 255, 234, 0.6);
  }
  .winners-list {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
  }
  .winner-big {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-3) 100%);
    color: #001020;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 2px;
    padding: 16px 32px;
    border-radius: 4px;
    box-shadow:
      0 0 30px var(--glow),
      0 0 60px rgba(61, 255, 234, 0.3),
      inset 0 0 20px rgba(255, 255, 255, 0.2);
    animation: pop .5s cubic-bezier(.2,.8,.2,1.2);
    text-transform: uppercase;
    position: relative;
  }
  .winner-big::before {
    content: '';
    position: absolute;
    inset: -2px;
    border: 1px solid var(--accent-3);
    border-radius: 4px;
    animation: scanBorder 2s linear infinite;
    pointer-events: none;
  }
  @keyframes scanBorder {
    0%, 100% { opacity: .4; }
    50% { opacity: 1; }
  }
  @keyframes pop {
    0% { transform: scale(.3); opacity: 0; filter: blur(8px); }
    70% { transform: scale(1.1); filter: blur(0); }
    100% { transform: scale(1); opacity: 1; }
  }

  .empty {
    color: var(--muted);
    font-size: 14px;
    padding: 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .hint {
    color: var(--muted);
    font-size: 12px;
    margin-top: 10px;
    letter-spacing: .5px;
  }
  .hint strong { color: var(--accent); }
</style>
</head>
<body>
  <div class="container">
    <header>
      <img src="https://i.imgur.com/QGbp3pe.png" alt="Logo Krill" />
      <h1>Sorteio</h1>
    </header>

    <div class="grid">
      <div class="card">
        <h2>Participantes</h2>
        <textarea id="namesInput" placeholder="Digite um nome por linha&#10;&#10;Ex:&#10;Maria Silva&#10;João Souza&#10;Ana Paula"></textarea>
        <div class="row">
          <button class="btn-primary" id="addBtn">Adicionar nomes</button>
          <label class="file-label">
            Enviar Excel
            <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" />
          </label>
          <button class="btn-danger" id="clearBtn">Limpar tudo</button>
        </div>
        <p class="hint">A planilha deve ter uma coluna chamada <strong>Nomes</strong> (aceita variações como "nome", "name").</p>
      </div>

      <div class="card">
        <h2>Sorteio</h2>
        <div class="row" style="margin-top: 0;">
          <div class="count-control">
            <label for="winnerCount">Quantos vencedores:</label>
            <input type="number" id="winnerCount" min="1" value="1" />
          </div>
          <button class="btn-primary" id="drawBtn">Sortear</button>
          <button class="btn-ghost" id="resetDrawBtn">Novo sorteio</button>
        </div>

        <div class="winners-section" id="winnersSection">
          <h2>VENCEDORES</h2>
          <div class="winners-list" id="winnersList"></div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top: 20px;">
      <div class="stats">
        <span>Total: <strong id="totalCount">0</strong></span>
        <span>Vencedores sorteados: <strong id="wonCount">0</strong></span>
      </div>
      <div class="names-box" id="namesBox">
        <div class="empty">Nenhum nome adicionado ainda.</div>
      </div>
    </div>
  </div>

<script>
  const namesInput = document.getElementById('namesInput');
  const addBtn = document.getElementById('addBtn');
  const fileInput = document.getElementById('fileInput');
  const clearBtn = document.getElementById('clearBtn');
  const namesBox = document.getElementById('namesBox');
  const totalCountEl = document.getElementById('totalCount');
  const wonCountEl = document.getElementById('wonCount');
  const drawBtn = document.getElementById('drawBtn');
  const resetDrawBtn = document.getElementById('resetDrawBtn');
  const winnerCountInput = document.getElementById('winnerCount');
  const winnersSection = document.getElementById('winnersSection');
  const winnersList = document.getElementById('winnersList');

  let names = [];
  let winners = [];
  let isDrawing = false;

  function render() {
    namesBox.innerHTML = '';
    if (names.length === 0) {
      namesBox.innerHTML = '<div class="empty">Nenhum nome adicionado ainda.</div>';
    } else {
      names.forEach((n, i) => {
        const chip = document.createElement('div');
        const isWinner = winners.includes(n);
        chip.className = 'chip' + (isWinner ? ' winner' : '');
        chip.innerHTML = `<span>${escapeHtml(n)}</span><span class="rm" data-i="${i}" title="Remover">×</span>`;
        namesBox.appendChild(chip);
      });
      namesBox.querySelectorAll('.rm').forEach(el => {
        el.addEventListener('click', e => {
          const i = parseInt(el.dataset.i);
          const removed = names.splice(i, 1)[0];
          winners = winners.filter(w => w !== removed);
          updateWinnersUI();
          render();
        });
      });
    }
    totalCountEl.textContent = names.length;
    wonCountEl.textContent = winners.length;
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function addNamesFromText(text) {
    const parts = text.split(/[\n,;]+/).map(s => s.trim()).filter(Boolean);
    const existing = new Set(names.map(n => n.toLowerCase()));
    let added = 0;
    parts.forEach(p => {
      if (!existing.has(p.toLowerCase())) {
        names.push(p);
        existing.add(p.toLowerCase());
        added++;
      }
    });
    return added;
  }

  addBtn.addEventListener('click', () => {
    const text = namesInput.value.trim();
    if (!text) return;
    addNamesFromText(text);
    namesInput.value = '';
    render();
  });

  clearBtn.addEventListener('click', () => {
    if (names.length === 0 && winners.length === 0) return;
    if (confirm('Tem certeza que deseja limpar todos os nomes?')) {
      names = [];
      winners = [];
      updateWinnersUI();
      render();
    }
  });

  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const data = new Uint8Array(evt.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
        if (rows.length === 0) { alert('Planilha vazia.'); return; }

        const firstRow = rows[0];
        const keys = Object.keys(firstRow);
        const nameKey = keys.find(k => /^(nomes?|name|nome completo|participantes?)$/i.test(k.trim()))
                    || keys[0];

        let added = 0;
        const existing = new Set(names.map(n => n.toLowerCase()));
        rows.forEach(r => {
          const v = String(r[nameKey] ?? '').trim();
          if (v && !existing.has(v.toLowerCase())) {
            names.push(v);
            existing.add(v.toLowerCase());
            added++;
          }
        });
        render();
        alert(`${added} nome(s) adicionado(s) da coluna "${nameKey}".`);
      } catch (err) {
        alert('Erro ao ler o arquivo: ' + err.message);
      }
      fileInput.value = '';
    };
    reader.readAsArrayBuffer(file);
  });

  function updateWinnersUI() {
    if (winners.length === 0) {
      winnersSection.classList.remove('show');
      winnersList.innerHTML = '';
    } else {
      winnersSection.classList.add('show');
      winnersList.innerHTML = winners.map(w => `<div class="winner-big">${escapeHtml(w)}</div>`).join('');
    }
    wonCountEl.textContent = winners.length;
  }

  async function draw() {
    if (isDrawing) return;
    const qty = Math.max(1, parseInt(winnerCountInput.value) || 1);
    const pool = names.filter(n => !winners.includes(n));
    if (pool.length === 0) { alert('Não há participantes disponíveis.'); return; }
    if (qty > pool.length) {
      alert(`Só há ${pool.length} participante(s) disponível(is).`);
      return;
    }

    isDrawing = true;
    drawBtn.disabled = true;

    const selected = [];
    const available = [...pool];

    for (let w = 0; w < qty; w++) {
      await animateRoll(available, 1500 + w * 100);
      const idx = Math.floor(Math.random() * available.length);
      const pick = available.splice(idx, 1)[0];
      selected.push(pick);
      winners.push(pick);
      updateWinnersUI();
      render();
      await sleep(400);
    }

    isDrawing = false;
    drawBtn.disabled = false;
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function animateRoll(pool, duration) {
    const start = performance.now();
    let interval = 50;
    while (performance.now() - start < duration) {
      const fake = pool[Math.floor(Math.random() * pool.length)];
      highlightRolling(fake);
      await sleep(interval);
      const elapsed = performance.now() - start;
      interval = 50 + (elapsed / duration) * 200;
    }
    clearRolling();
  }

  function highlightRolling(name) {
    namesBox.querySelectorAll('.chip').forEach(chip => {
      const txt = chip.querySelector('span').textContent;
      chip.classList.toggle('rolling', txt === name && !chip.classList.contains('winner'));
    });
  }
  function clearRolling() {
    namesBox.querySelectorAll('.chip.rolling').forEach(c => c.classList.remove('rolling'));
  }

  drawBtn.addEventListener('click', draw);

  resetDrawBtn.addEventListener('click', () => {
    winners = [];
    updateWinnersUI();
    render();
  });

  render();
</script>
</body>
</html>
